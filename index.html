<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="班级图片展示 - 记录美好校园时光">
    <meta name="keywords" content="班级,图片,相册,校园">
    <title>班级图片展示 | 首页</title>
    
    <!-- AOS 动画库 CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Animate.css 动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <!-- 
                    【重要】请替换为您的班级logo图片
                    路径: img/logo.png
                    建议尺寸: 200x200px 正方形
                -->
                <img src="img/logo.png" alt="班级Logo" onerror="this.style.display='none'">
                <span>班级相册</span>
            </a>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">关于</a></li>
            </ul>
            
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main>
        <!-- Hero 区域 -->
        <section class="hero">
            <div class="hero-content">
                <h1 class="animate__animated animate__fadeInDown">
                    📸 班级精彩瞬间
                </h1>
                <p class="animate__animated animate__fadeInUp animate__delay-1s">
                    记录我们的美好时光，珍藏每一份回忆
                </p>
            </div>
        </section>

        <!-- 图片画廊区域 -->
        <section class="gallery-section">
            <h2 class="section-title" data-aos="fade-up">精彩图集</h2>
            <p class="section-subtitle" data-aos="fade-up" data-aos-delay="100">
                点击下方图片查看更多精彩内容
            </p>

            <!-- 
                ========================================
                图片画廊网格
                ========================================
                
                【如何添加新图片】
                1. 复制一个 gallery-item div 块
                2. 修改 img 标签的 src 属性为图床链接
                3. 修改 data-src 属性（可选，用于懒加载）
                4. 修改 overlay 中的标题和描述
                
                【图床推荐】
                - 阿里云 OSS
                - 腾讯云 COS
                - 七牛云
                - Imgur (国际)
                - SM.MS (免费)
                
                【示例格式】
                <div class="gallery-item" data-aos="fade-up" data-aos-delay="200">
                    <img src="YOUR_IMAGE_URL_HERE" 
                         alt="图片描述" 
                         loading="lazy">
                    <div class="gallery-overlay">
                        <h3>图片标题</h3>
                        <p>图片描述文字</p>
                    </div>
                </div>
            -->

            <div class="gallery-grid">
                <!-- 图片项目 1 -->
                <div class="gallery-item" data-aos="fade-up" data-aos-delay="100">
                    <!-- 
                        【替换说明】将下方 src 替换为您的图床图片链接
                        例如: https://example.com/photo1.jpg
                    -->
                    <img src="https://picsum.photos/800/600?random=1" 
                         alt="班级活动照片1" 
                         loading="lazy">
                    <div class="gallery-overlay">
                        <h3>春游活动</h3>
                        <p>春暖花开，我们一起出游</p>
                    </div>
                </div>

                <!-- 图片项目 2 -->
                <div class="gallery-item" data-aos="fade-up" data-aos-delay="200">
                    <img src="https://picsum.photos/800/600?random=2" 
                         alt="班级活动照片2" 
                         loading="lazy">
                    <div class="gallery-overlay">
                        <h3>运动会</h3>
                        <p>挥洒汗水，拼搏进取</p>
                    </div>
                </div>

                <!-- 图片项目 3 -->
                <div class="gallery-item" data-aos="fade-up" data-aos-delay="300">
                    <img src="https://picsum.photos/800/600?random=3" 
                         alt="班级活动照片3" 
                         loading="lazy">
                    <div class="gallery-overlay">
                        <h3>课堂学习</h3>
                        <p>认真听讲，积极思考</p>
                    </div>
                </div>

                <!-- 图片项目 4 -->
                <div class="gallery-item" data-aos="fade-up" data-aos-delay="400">
                    <img src="https://picsum.photos/800/600?random=4" 
                         alt="班级活动照片4" 
                         loading="lazy">
                    <div class="gallery-overlay">
                        <h3>文艺汇演</h3>
                        <p>展示才艺，绽放光彩</p>
                    </div>
                </div>

                <!-- 图片项目 5 -->
                <div class="gallery-item" data-aos="fade-up" data-aos-delay="500">
                    <img src="https://picsum.photos/800/600?random=5" 
                         alt="班级活动照片5" 
                         loading="lazy">
                    <div class="gallery-overlay">
                        <h3>毕业合影</h3>
                        <p>青春不散场，我们永远在一起</p>
                    </div>
                </div>

                <!-- 图片项目 6 -->
                <div class="gallery-item" data-aos="fade-up" data-aos-delay="600">
                    <img src="https://picsum.photos/800/600?random=6" 
                         alt="班级活动照片6" 
                         loading="lazy">
                    <div class="gallery-overlay">
                        <h3>主题班会</h3>
                        <p>交流思想，共同成长</p>
                    </div>
                </div>

                <!-- 
                    【添加更多图片】
                    在此处继续添加新的 gallery-item
                    
                    提示：data-aos-delay 的值可以设置为 100, 200, 300... 
                    以实现交错的动画效果
                -->
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 班级相册. 保留所有权利.</p>
            <p>用 ❤️ 记录美好时光</p>
            <ul class="footer-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
        </div>
    </footer>

    <!-- AOS 动画库 JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- 自定义 JavaScript -->
    <script>
        // 初始化 AOS 动画
        AOS.init({
            duration: 800,           // 动画持续时间（毫秒）
            easing: 'ease-in-out',   // 动画缓动函数
            once: true,              // 动画只执行一次
            offset: 100,             // 触发动画的偏移量
            disable: false           // 不禁用动画（在移动设备上也可用）
        });

        // 移动端菜单切换
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            
            // 添加汉堡菜单动画
            const spans = menuToggle.querySelectorAll('span');
            if (navLinks.classList.contains('active')) {
                spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'rotate(-45deg) translate(7px, -6px)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        });

        // 点击导航链接后关闭菜单
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                const spans = menuToggle.querySelectorAll('span');
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            });
        });

        // 图片点击放大功能（简单实现）
        document.querySelectorAll('.gallery-item img').forEach(img => {
            img.addEventListener('click', function() {
                // 创建模态框
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.9);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 10000;
                    cursor: pointer;
                    animation: fadeIn 0.3s ease;
                `;
                
                const modalImg = document.createElement('img');
                modalImg.src = this.src;
                modalImg.alt = this.alt;
                modalImg.style.cssText = `
                    max-width: 90%;
                    max-height: 90%;
                    object-fit: contain;
                    border-radius: 8px;
                    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                `;
                
                modal.appendChild(modalImg);
                document.body.appendChild(modal);
                
                // 点击关闭
                modal.addEventListener('click', () => {
                    modal.style.animation = 'fadeOut 0.3s ease';
                    setTimeout(() => modal.remove(), 300);
                });
            });
        });

        // 添加淡入淡出动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // 滚动时导航栏效果
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            const currentScroll = window.pageYOffset;
            
            if (currentScroll > 100) {
                navbar.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.3)';
            } else {
                navbar.style.boxShadow = '0 4px 16px rgba(0, 0, 0, 0.15)';
            }
            
            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
